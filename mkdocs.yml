site_name: Serpentine3D
site_description: >-
  Documentation for Serpentine3D — an open-source NURBS surface modeller for
  Linux, Windows and macOS, with a Rhino-style workflow and native AI (MCP)
  integration.
site_url: https://chisomobanzi.github.io/Serpentine3D/docs/
repo_url: https://github.com/chisomobanzi/Serpentine3D
repo_name: chisomobanzi/Serpentine3D
edit_uri: edit/main/docs/

exclude_docs: |
  gen_commands.py

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Get started:
      - Install: getstarted/install.md
      - Your first model: getstarted/first-model.md
      - "Tutorial: a stage flat": getstarted/stage-flat.md
  - How-to guides:
      - Export for 3D printing: howto/3d-printing.md
      - Make a drawing sheet: howto/drawings.md
      - Script & automate: howto/scripting.md
      - Drive it with AI (MCP): howto/ai-mcp.md
  - Reference:
      - Command reference: reference/commands.md
      - File formats: reference/file-formats.md
      - Keyboard & mouse: reference/keyboard.md
  - Explanation:
      - How it works: explanation/how-it-works.md
  - Coming from Rhino: coming-from-rhino.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/chisomobanzi/Serpentine3D
    - icon: material/web
      link: https://chisomobanzi.github.io/Serpentine3D/
