name: Deploy site

# Publishes the landing page (website/) at / and the mkdocs docs at /docs/.
on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let a newer push supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docs dependencies
        run: pip install "mkdocs>=1.6" "mkdocs-material>=9.5"
      - name: Build combined site (landing at /, docs at /docs/)
        run: |
          mkdir -p _site
          cp -r website/* _site/
          mkdocs build --strict --site-dir _site/docs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
      - id: deployment
        uses: actions/deploy-pages@v4
