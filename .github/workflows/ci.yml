name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: System libraries for Qt/OpenGL
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-shape0 \
            libxcb-render-util0 libxcb-xinerama0 libxcb-cursor0 \
            libfontconfig1 libdbus-1-3
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Unit tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -q --ignore=tests/e2e_dod.py

  headless-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          sudo apt-get update && sudo apt-get install -y libgl1 libegl1 \
            libfontconfig1
          python -m pip install -U pip && pip install -e .
      - name: serp-batch smoke test
        run: |
          cat > smoke.py << 'PY'
          doc.add(geo.make_box((0, 0, 0), 10, 10, 10), name="Box")
          doc.run("filletedge", ["Box", "", "1"])
          doc.export("out.step")
          doc.export("out.glb")
          print("volume:", round(doc.volume("Box"), 1))
          PY
          serp-batch smoke.py
          test -s out.step && test -s out.glb
